{% extends 'base.html' %}

{% block title %}Edit Book - BookCatalog{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-container">
        <h1>Edit Book</h1>
        
        <form method="POST" enctype="multipart/form-data" class="book-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" value="{{ book.title }}" required class="form-control">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" required class="form-control" rows="5">{{ book.description }}</textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" name="price" value="{{ book.price }}" step="0.01" required class="form-control">
                </div>

                <div class="form-group">
                    <label>Author</label>
                    <select name="author" required class="form-control">
                        {% for author in authors %}
                            <option value="{{ author.id }}" {% if author.id == book.author.id %}selected{% endif %}>{{ author.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select name="category" required class="form-control">
                        {% for category in categories %}
                            <option value="{{ category.id }}" {% if category.id == book.category.id %}selected{% endif %}>{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Book</button>
                <a href="{% url 'book_detail' book.id %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
