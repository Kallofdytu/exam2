{% extends 'base.html' %}

{% block title %}Add Book - BookCatalog{% endblock %}

{% block content %}
<section class="auth-section" style="display:flex;align-items:center;justify-content:center;min-height:80vh;">
    <div class="auth-container" style="width:100%;max-width:500px;">
        <div class="auth-card" style="background:rgba(31,64,104,0.85);padding:40px 32px 32px 32px;border-radius:16px;box-shadow:0 0 24px #4ef3ff22;">
            <h1 style="color:#4ef3ff;font-family:'Cormorant Garamond',serif;font-size:2.2rem;margin-bottom:1.5rem;text-align:center;">Добавить книгу</h1>
            <form method="POST" enctype="multipart/form-data" class="book-form">
                {% csrf_token %}
                <div class="form-group" style="margin-bottom:20px;">
                    <label style="color:#eaf6fb;font-weight:600;">Название</label>
                    <input type="text" name="title" required class="form-control" style="width:100%;padding:12px;border:1px solid #23395d;border-radius:7px;font-size:15px;background:#162447;color:#eaf6fb;">
                </div>
                <div class="form-group" style="margin-bottom:20px;">
                    <label style="color:#eaf6fb;font-weight:600;">Описание</label>
                    <textarea name="description" required class="form-control" rows="4" style="width:100%;padding:12px;border:1px solid #23395d;border-radius:7px;font-size:15px;background:#162447;color:#eaf6fb;"></textarea>
                </div>
                <div class="form-group" style="margin-bottom:20px;">
                    <label style="color:#eaf6fb;font-weight:600;">Цена</label>
                    <input type="number" name="price" step="0.01" required class="form-control" style="width:100%;padding:12px;border:1px solid #23395d;border-radius:7px;font-size:15px;background:#162447;color:#eaf6fb;">
                </div>
                <div class="form-row" style="display:flex;gap:16px;margin-bottom:20px;">
                    <div class="form-group" style="flex:1;">
                        <label style="color:#eaf6fb;font-weight:600;">Автор</label>
                        <select name="author" required class="form-control" style="width:100%;padding:12px;border:1px solid #23395d;border-radius:7px;font-size:15px;background:#162447;color:#eaf6fb;">
                            <option value="">Выберите автора</option>
                            {% for author in authors %}
                                <option value="{{ author.id }}">{{ author.full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label style="color:#eaf6fb;font-weight:600;">Категория</label>
                        <select name="category" required class="form-control" style="width:100%;padding:12px;border:1px solid #23395d;border-radius:7px;font-size:15px;background:#162447;color:#eaf6fb;">
                            <option value="">Выберите категорию</option>
                            {% for category in categories %}
                                <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:24px;">
                    <label style="color:#eaf6fb;font-weight:600;">Обложка</label>
                    <input type="file" name="cover_image" class="form-control" style="width:100%;padding:10px;border:1px solid #23395d;border-radius:7px;font-size:15px;background:#162447;color:#eaf6fb;">
                </div>
                <div class="form-actions" style="display:flex;gap:16px;justify-content:center;margin-top:18px;">
                    <button type="submit" class="cta-btn" style="min-width:140px;">Добавить</button>
                    <a href="{% url 'book_list' %}" class="cta-btn ghost" style="min-width:120px;">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
