{% extends 'base.html' %}

{% block title %}Set New Password - BookCatalog{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <h1>Set New Password</h1>
            <p class="subtitle">Enter your new password</p>
            
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="POST" class="auth-form">
                {% csrf_token %}

                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="password" required class="form-control" placeholder="Enter new password" minlength="6">
                    <small>At least 6 characters</small>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required class="form-control" placeholder="Confirm password" minlength="6">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
            </form>

            <p class="auth-link"><a href="{% url 'login' %}">Back to Login</a></p>
        </div>
    </div>
</section>
{% endblock %}
