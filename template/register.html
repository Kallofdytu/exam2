{% extends 'base.html' %}

{% block title %}Register - Библиотека{% endblock %}

{% block content %}
<section class="auth-section" style="display:flex;align-items:center;justify-content:center;min-height:80vh;">
    <div class="auth-container" style="width:100%;max-width:400px;">
        <div class="auth-card" style="background:rgba(31,64,104,0.8);padding:40px;border-radius:16px;box-shadow:0 0 24px #4ef3ff22;">
            <h1 style="color:#4ef3ff;font-family:'Cormorant Garamond',serif;font-size:2.2rem;margin-bottom:1.5rem;">Создать аккаунт</h1>
            {% if error %}
                <div class="alert alert-danger" style="background:#ff6b81;color:#fff;padding:10px 0;border-radius:8px;margin-bottom:1rem;text-align:center;">{{ error }}</div>
            {% endif %}
            {% if success %}
                <div class="alert alert-success" style="background:#1fd1a1;color:#fff;padding:10px 0;border-radius:8px;margin-bottom:1rem;text-align:center;">{{ success }}</div>
            {% endif %}
            <form method="POST" class="auth-form">
                {% csrf_token %}
                <div class="form-group" style="margin-bottom:20px;">
                    <label style="color:#eaf6fb;font-weight:600;">Имя пользователя</label>
                    <input type="text" name="username" required class="form-control" placeholder="Введите имя" style="width:100%;padding:12px;border:1px solid #23395d;border-radius:7px;font-size:15px;background:#162447;color:#eaf6fb;">
                </div>
                <div class="form-group" style="margin-bottom:20px;">
                    <label style="color:#eaf6fb;font-weight:600;">Email</label>
                    <input type="email" name="email" required class="form-control" placeholder="Введите email" style="width:100%;padding:12px;border:1px solid #23395d;border-radius:7px;font-size:15px;background:#162447;color:#eaf6fb;">
                </div>
                <div class="form-group" style="margin-bottom:20px;">
                    <label style="color:#eaf6fb;font-weight:600;">Пароль</label>
                    <input type="password" name="password" required class="form-control" placeholder="Введите пароль" minlength="6" style="width:100%;padding:12px;border:1px solid #23395d;border-radius:7px;font-size:15px;background:#162447;color:#eaf6fb;">
                </div>
                <div class="form-group" style="margin-bottom:20px;">
                    <label style="color:#eaf6fb;font-weight:600;">Подтвердите пароль</label>
                    <input type="password" name="confirm_password" required class="form-control" placeholder="Подтвердите пароль" minlength="6" style="width:100%;padding:12px;border:1px solid #23395d;border-radius:7px;font-size:15px;background:#162447;color:#eaf6fb;">
                </div>
                <button type="submit" class="cta-btn" style="width:100%;margin-top:10px;">Зарегистрироваться</button>
            </form>
            <p class="auth-link" style="margin-top:18px;color:#b2becd;">Уже есть аккаунт? <a href="{% url 'login' %}" style="color:#4ef3ff;">Войти</a></p>
        </div>
    </div>
</section>
{% endblock %}
