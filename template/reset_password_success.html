{% extends 'base.html' %}

{% block title %}Password Reset Success - BookCatalog{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card success-card">
            <div class="success-icon">✓</div>
            <h1>Password Reset Successfully</h1>
            <p class="subtitle">Your password has been changed</p>
            
            <p class="info-text">
                You can now log in with your new password
            </p>

            <a href="{% url 'login' %}" class="btn btn-primary btn-block">Go to Login</a>
        </div>
    </div>
</section>
{% endblock %}
